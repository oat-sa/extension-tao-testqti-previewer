<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Test Previewer - NUI Scale Wrapper</title>
        <base href="../../../../../../../../../../../tao/views/" />
        <link rel="stylesheet" type="text/css" href="js/lib/qunit/qunit.css">
        <link rel="stylesheet" href="css/tao-main-style.css"/>
        <link rel="stylesheet" href="css/tao-3.css"/>
        <script type="text/javascript" src="js/lib/qunit/qunit.js"></script>
        <script type="text/javascript" src="js/lib/require.js"></script>
        <script type="text/javascript" src="js/lib/qunit/qunit-parameterize.js"></script>
        <script type="text/javascript" src="js/lib/blanket/blanket.min.js" data-cover-flag="branchTracking" data-cover-only="previewer/plugins/tools/scale/wrapper/previewScaleWrapperNUI.js"></script>
        <script type="text/javascript">
            QUnit.config.autostart = false;

            require(['/tao/ClientConfig/config'], function () {
                require(['taoQtiTestPreviewer/test/previewer/plugins/tools/scale/wrapper/previewScaleWrapperNUI/test'], function () {
                    QUnit.start();
                });
            });
        </script>
    </head>
    <body>
        <div id="qunit"></div>
        <div id="qunit-fixture">
            <div id="fixture-wrapper"></div>
            <div id="fixture-content">content</div>
            <div id="fixture-wrapper-2"></div>
            <div id="fixture-content-2">content</div>
            <div id="fixture-wrapper-3"></div>
        </div>
    </body>
</html>
